repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format

- repo: local
  hooks:
    - id: check-ty
      name: ty-check
      language: python
      entry: ty check
      args: [--python=.venv/]
      pass_filenames: false
      additional_dependencies: [ty]
